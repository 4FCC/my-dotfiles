[theme]
theme = "plain"

[theme.overrides]
idle_bg        = "#000000"
idle_fg        = "#ffffff"
info_bg        = "#000000"
info_fg        = "#ffffff"
good_bg        = "#000000"
good_fg        = "#ffffff"
warning_bg     = "#000000"
warning_fg     = "#aaaaaa"
critical_bg    = "#ffffff"
critical_fg    = "#000000"
separator      = " | "
separator_bg   = "#000000"
separator_fg   = "#555555"

[icons]
icons = "none"

[[block]]
block = "cpu"
interval = 2
format = " CPU $utilization "

[[block]]
block = "memory"
format = " RAM $mem_used_percents "
interval = 5

[[block]]
block = "disk_space"
path = "/"
format = " DISK $available "
interval = 20

[[block]]
block = "net"
format = " NET {$ssid |}{$speed_down $speed_up} "
interval = 5

[[block]]
block = "battery"
format = " BAT $percentage $time "
interval = 30

[[block]]
block = "backlight"
format = " BRI $brightness "

[[block]]
block = "sound"
format = " VOL $volume "

[[block]]
block = "time"
format = " $timestamp.datetime(f:'%Y-%m-%d %H:%M:%S') "
interval = 1
